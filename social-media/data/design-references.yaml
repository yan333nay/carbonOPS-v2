name: design-references
version: 3.0.0
description: 'Referências visuais analisadas a partir de 18 posts + 6 carrosséis reais. Pixel e Paulo Cuenca consultam este arquivo para calibrar estilo visual dos posts da Carbon Films.'
last_updated: '2026-03-31'
status: active
source_folder: 'C:/Users/suzam/Downloads/Referências de posts'

# ================================================================
# PADRÕES VISUAIS EXTRAÍDOS — ANÁLISE COMPLETA
# 18 posts de feed + 6 carrosséis (40+ slides analisados)
# ================================================================

visual_patterns:

  typography:
    headline_weight: 'Extra-Bold ou Black (900) — ocupa 50-80% do espaço visual'
    headline_case: 'Caixa alta para palavra de maior impacto, title case para o restante'
    accent_technique: 'Uma palavra-chave em cor diferente (azul, dourado, vermelho, verde) no headline'
    subtitle_weight: 'Regular ou Light — contraste intencional com o headline'
    mixed_weights_in_headline: 'Comum misturar "Essa é a rotina do" (light) + "EMPRESÁRIO NO CAOS" (black)'
    editorial_style: 'Serifa Display (alto contraste thick/thin) para posts premium/editoriais'
    fonts_observed:
      - 'Anton (Google Fonts) — headlines cinematográficos, carrosséis de impacto'
      - 'Bebas Neue — posts dark dramáticos'
      - 'Inter Bold/Black — layouts clean e corporativos (EAG)'
      - 'Playfair Display / serifa alto contraste — estilo editorial premium (MIII)'
      - 'Poppins Bold — uso geral, versátil'
    size_hierarchy:
      hook_main: '64-96px equivalente — palavra de maior impacto'
      hook_support: '32-48px — restante do headline'
      subtitle: '18-24px'
      cta_label: '14-16px'
      brand_tag: '11-13px — discreto, canto superior'

  color_palettes:
    dark_dramatic:
      description: 'Fundo escuro quase preto + texto branco + 1 cor de acento'
      background: '#080808 a #1C1C1C'
      text_primary: '#FFFFFF'
      accent_blue: '#3B82F6'
      accent_gold: '#F59E0B'
      accent_red: '#DC2626'
      accent_green: '#22C55E'
      use_for: 'Posts de impacto, dor do cliente, provocação, autoridade'
      examples:
        - 'Geovane Rocha (bomba de dinheiro + azul)'
        - 'Fiden (xadrez + tráfego pago + azul)'
        - 'NexOn DiCaprio (venda todos os dias + vermelho)'
        - 'João Mendes (escritório + verde)'

    warm_dark:
      description: 'Fundo dourado/marrom escuro + overlay + texto branco e dourado'
      background: '#1A0F00 a #2A1800'
      overlay: 'gradiente radial escuro sobre imagem quente'
      text_primary: '#FFFFFF'
      text_accent: '#F59E0B'
      use_for: 'Posts com celebridade, autoridade máxima, resultado premium'
      examples:
        - 'EAG Elon Musk (delegação)'
        - 'EAG DiCaprio (boca tapada)'
        - 'EAG empresário no caos'
        - 'Unusual (dinheiro queimando + golden)'

    high_contrast_red:
      description: 'Vermelho profundo + branco — urgência e revelação de dados'
      background: '#7F1D1D a #991B1B'
      text_primary: '#FFFFFF'
      accent: '#FCA5A5'
      use_for: 'Carrosséis de problema, "a dura verdade", lista de erros'

    clean_light_yellow:
      description: 'Amarelo/bege claro + texto escuro — educativo, acessível'
      background: '#FEF3C7 a #FDE68A'
      text_primary: '#111827'
      accent_icon: '#EF4444'
      card_bg: '#FFFFFF'
      use_for: 'Carrosséis educativos, listas de dicas, conteúdo positivo'

    clean_white_gray:
      description: 'Branco/cinza claríssimo + texto escuro — premium, minimalista'
      background: '#F8F8F8 a #FFFFFF'
      text_primary: '#111827'
      accent: '#3B82F6 ou #F59E0B'
      divider: 'linha fina cinza clara'
      use_for: 'Carrosséis ultra-clean, slides de solução, CTA final'

    dark_navy_educational:
      description: 'Azul marinho escuro + cards brancos — educativo premium'
      background: '#0F172A a #1E293B'
      text_primary: '#FFFFFF'
      card_bg: '#FFFFFF'
      card_text: '#111827'
      accent: '#F59E0B (badge numerado)'
      use_for: 'Carrosséis com steps numerados, listas de processos, frameworks'

    editorial_minimal:
      description: 'Fundo claro ou foto ambiente + serifa elegante — tom reflexivo'
      background: 'Fotografia de ambiente (natureza, textura) ou branco puro'
      text: 'Escuro sobre claro, variando serifada thin/bold'
      use_for: 'Carrosséis de reflexão, frases de impacto, conteúdo filosófico sobre negócios'

  imagery_types:
    type_1_celebrity_authority:
      description: 'Celebridade ou figura de autoridade reconhecida mundialmente'
      treatment: 'Photo realista com color grade frio ou quente, fundo de cena contextual'
      examples: 'Elon Musk, DiCaprio, Zuckerberg vs Page'
      use_for: 'Hooks de provocação associados a grandes nomes'
      adapt_carbon: 'Trocar por sócio em pose séria com equipamento — a câmera é o símbolo de autoridade'

    type_2_dramatic_object:
      description: 'Objeto com carga simbólica intensa em situação dramática'
      examples: 'Dinheiro queimando, bomba de notas, xadrez + dinheiro, planta em moedas'
      treatment: 'Iluminação dramática spot, fundo escuro ou desfocado, renderização 3D ou foto real'
      use_for: 'Metáfora visual para dor financeira ou consequência de erro'
      adapt_carbon: 'Câmera quebrando, filme inutilizado, claquete rasgada, monitor sem conteúdo'

    type_3_archetype_photo:
      description: 'Personagem arquétipo do cliente-alvo em situação do dia a dia'
      examples: 'Mecânico com chave, empresário no caos, vendedor preguiçoso'
      treatment: 'AI-generated realista ou stock foto, expressão intensa, fundo contextual desfocado'
      use_for: 'Identificação imediata — "esse sou eu"'
      adapt_carbon: 'Empresário olhando para celular sem conteúdo, gestor de marketing estressado'

    type_4_absurd_humor:
      description: 'Personagem inusitado ou absurdo para quebrar padrão do feed'
      examples: 'Preguiça (Zootopia) sentada como atendente ruim, animal em escritório'
      treatment: 'AI-generated ou personagem 3D animado em ambiente realista'
      use_for: 'Posts de humor com crítica — "seu atendente parece isso"'
      adapt_carbon: 'Câmera antiga/quebrada como "seu conteúdo de hoje"'

    type_5_real_partner_photo:
      description: 'Foto real do sócio/fundador — máxima autenticidade'
      examples: 'MORO no sofá com laptop, @guilhermeo1 em fundo preto'
      treatment: 'Foto profissional em ambiente neutro ou de trabalho, iluminação de estúdio simples'
      layout: 'Texto grande sobre fundo preto/escuro, foto do sócio integrada'
      use_for: 'Autoridade pessoal, o que fazemos, nossa visão, provocação direta'
      adapt_carbon: 'PRIORIDADE — sócios com câmera ou em set de gravação'
      notes: 'Quando o rosto do dono aparece, o engajamento aumenta significativamente'

    type_6_versus_battle:
      description: 'Dois elementos em confronto visual — A vs B'
      examples: 'Zuckerberg vs Larry Page em octógono de MMA'
      treatment: 'Montagem/composição digital com os dois sujeitos em pose de confronto'
      use_for: 'Comparativos ("qual é melhor?"), debates do setor'
      adapt_carbon: 'Vídeo Profissional vs Celular, Agência vs Freelancer'

    type_7_product_person:
      description: 'Pessoa segurando produto de forma assertiva'
      examples: 'Cara tatuado segurando frasco de shampoo'
      treatment: 'Fundo de ambiente contextual, iluminação de estúdio, expressão confiante/intensa'
      use_for: 'Promoção de produto/serviço com personalidade forte'
      adapt_carbon: 'Sócio segurando câmera/equipamento com expressão confiante'

  hook_formulas_observed:
    provocacao_direta:
      formula: '[Não faça/Não contrate/Demita] [coisa que parece óbvia]'
      examples:
        - 'Não contrate esse tipo de vendedor'
        - 'Demita seu atendente o quanto antes'

    dado_chocante:
      formula: '[X%] das [pessoas/empresas] [perdem/erram] [coisa crítica]'
      examples:
        - '90% das oficinas perdem o cliente no atendimento'

    contradicao_crenca:
      formula: '[Você não precisa] [do que todos dizem que precisa]'
      examples:
        - 'Você não precisa abaixar o seu preço'
        - 'Bonito não paga boleto'

    consequencia_inevitavel:
      formula: '[Ação comum] sem [X] = [resultado negativo forte]'
      examples:
        - 'Conteúdo sem estratégia é como queimar dinheiro'
        - 'Tráfego pago sem estratégia: atalho para perda de dinheiro'

    diagnostico_problema:
      formula: '[Sua/Seu X] está [problema] — [consequência invisível]'
      examples:
        - 'Seu Instagram está FRAGMENTADO — seu cliente não te conhece de verdade'
        - 'Essa é a rotina do empresário no caos'

    pergunta_autocritica:
      formula: '[Você sabe/consegue] [habilidade crítica]?'
      examples:
        - 'Você sabe delegar tarefas?'
        - 'Por que é tão difícil vender?'

    confronto_logico:
      formula: 'Se você [faz X], por que alguém não [faria X de você]?'
      examples:
        - 'Se você compra de anúncios, por que alguém não compraria dos seus?'

    revelacao_verdade:
      formula: 'A verdade que ninguém quer ouvir: [fato contra-intuitivo]'
      examples:
        - 'Liberdade não nasce do caos. Ela nasce da autogestão.'
        - 'Não ter estratégia não é economia. É prejuízo operacional.'

    batalha_comparativa:
      formula: '[Opção A] ou [Opção B]? Quem [resultado]?'
      examples:
        - 'Meta Ads ou Google? Quem traz mais clientes?'

  cta_patterns:
    swipe_ctas:
      - 'Arrasta para o lado →'
      - 'Passe para o lado >'
      - 'Arraste para o lado →'
      - 'Continue vendo →'
    engagement_ctas:
      - 'Leia a legenda ↓'
      - 'Calma que tem mais...'
      - 'Clique no link da bio'
      - 'Compartilhe com quem precisa ouvir isso'
    design_style: 'Pill/cápsula arredondado, borda fina, fundo semi-transparente ou branco leve'

  layout_patterns:
    feed_cover_with_photo:
      structure: 'Imagem full-bleed + overlay gradiente de baixo + texto na metade inferior'
      logo_position: 'Canto superior esquerdo ou centro topo, pequeno e discreto'
      badge_agency: 'Rodapé esquerdo — logo + nome da agência + CTA direito'
      cta_position: 'Rodapé — pill arredondado "Arrasta para o lado"'

    feed_partner_focus:
      structure: 'Fundo sólido escuro + foto do sócio integrada + headline gigante em cima/ao lado'
      text_categories: 'Serviços em linha fina no topo (Conteúdo / Tráfego / Marketing)'
      headline_style: 'Extra-bold em caixa alta, muito grande, sobreposto à foto'

    feed_text_dominant:
      structure: 'Fundo sólido ou com textura sutil + só tipografia como elemento visual'
      use_for: 'Posts de autoridade onde o copy é tão forte que dispensa imagem'

    carousel_interior_numbered:
      structure: 'Badge número dourado + título do step + visual do conceito (agenda, lista, ícone)'
      progression: 'Cada slide = 1 step numerado do framework'
      visual_aids: 'Cards brancos arredondados com conteúdo dentro, ícones coloridos'

    carousel_interior_list:
      structure: 'Fundo sólido + título "O erro está em:" + cards brancos com ícone X ou check'
      icon_error: 'X vermelho/laranja em círculo — para lista de problemas'
      icon_success: 'Check verde em círculo — para lista de soluções'

    carousel_interior_clean_text:
      structure: 'Fundo branco/cinza claro + texto grande bold + bullet points com ">"'
      accent: '1 linha de resultado em azul ou gold para fechar o argumento'
      feel: 'Artigo de blog — direto, escaneável, sem imagem'

    carousel_last_slide_cta:
      options:
        - 'Foto real da pessoa/equipe + CTA direto ("Clique no link da bio")'
        - 'Slide tipográfico clean + pergunta de engajamento + chamada para compartilhar'
        - 'Fundo da marca + frase de impacto final + handle'

