# ================================================================
# PADRÕES PARA CARBON FILMS — ADAPTAÇÕES ESPECÍFICAS
# ================================================================
carbon_films_adaptations:
  nicho: 'Agência de vídeo e conteúdo para empresas'
  publico_alvo: 'Empresários e gestores de marketing, 28-45 anos, que precisam de presença digital visual'

  dores_mapeadas:
    - 'Invisível no digital — concorrentes aparecem, eu não'
    - 'Gasto com vídeo mas não vejo retorno'
    - 'Não sei o que postar, quando postar, como postar'
    - 'Minha equipe interna não tem capacidade técnica'
    - 'Produção cara demais para a frequência que preciso'

  hooks_prontos_para_uso:
    provocacao:
      - 'Seu concorrente já aparece todo dia. Onde você está?'
      - 'Demita seu conteúdo ruim. O quanto antes.'
      - 'Não contrate qualquer agência de vídeo'
    dado_chocante:
      - 'X% das empresas perdem clientes por não aparecer no digital'
      - 'Empresas com vídeo vendem [X]x mais que as sem'
    contradicao:
      - 'Você não precisa de estúdio para converter'
      - 'Vídeo bonito sem estratégia é dinheiro no lixo'
      - 'Câmera cara não faz conteúdo bom'
    diagnostico:
      - 'Seu conteúdo está INVISÍVEL — seu cliente não te encontra'
      - 'Essa é a rotina de quem não tem presença digital'
    logica_irrefutavel:
      - 'Se você assiste vídeos, por que seus clientes não assistiriam os seus?'
      - 'Se você compra de empresas que aparecem, por que não aparece para quem compra de você?'
    reflexao:
      - 'Não ter conteúdo não é economia. É prejuízo silencioso.'
      - 'Presença digital não é custo. É o seu vendedor que trabalha 24h.'

  visual_direction:
    primary_style: 'dark_dramatic com accent dourado — premium, autoridade, resultado'
    secondary_style: 'real_partner_photo em fundo preto — autenticidade e confiança'
    educational_style: 'dark_numbered_framework ou clean_white_gray — conteúdo de valor'
    avoid:
      - 'Stock photos genéricas sem contexto'
      - 'Cores pastéis ou tons muito suaves'
      - 'Tom informal ou engraçado demais (não é o nicho)'
      - 'Texto pequeno demais no visual — deve ser legível em thumbnail'

  priority_photos_needed:
    - desc: 'Sócio em pose séria/confiante, olhando direto para câmera, fundo preto ou neutro'
      use: 'Posts de autoridade, provocação direta, "nossa visão"'
    - desc: 'Sócio segurando câmera profissional com expressão confiante'
      use: 'Posts de produto/serviço, "o que fazemos"'
    - desc: 'Sócio em set de gravação — câmera, luz, monitores visíveis ao fundo'
      use: 'Bastidores, autoridade técnica, "como trabalhamos"'
    - desc: 'Ambos os sócios juntos em ambiente profissional'
      use: 'Apresentação da empresa, posts institucionais'
    - desc: 'Close da câmera ou equipamento com iluminação dramática'
      use: 'Posts sem foto humana — metáfora, objeto dramático'
