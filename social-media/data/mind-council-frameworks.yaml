  escrever_caption: [gary_vaynerchuk, paulo_cuenca]
  analisar_metricas: [neil_patel, rafael_kiso]
  detectar_tendencias: [gary_vaynerchuk, neil_patel]
  definir_posicionamento: [paulo_cuenca, gary_vaynerchuk]
  planejar_crescimento: [neil_patel, rafael_kiso]
