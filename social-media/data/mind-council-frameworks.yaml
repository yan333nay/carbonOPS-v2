# Principios unificados — consenso dos 4 especialistas
consensus_principles:
  - 'Metricas de vaidade (likes, seguidores) nao sao objetivos — saves, shares e conversao sao.'
  - 'Consistencia supera volume. Frequencia correta supera frequencia alta.'
  - 'Posicionamento e inegociavel. Conteudo neutro nao cresce.'
  - 'Dados antes de escalar. Teste antes de concluir.'
  - 'Autenticidade bate producao polida no longo prazo.'
  - 'Cada plataforma exige formato e linguagem proprios.'
  - 'Hot topics tem janela de 24-48h. Velocidade e vantagem competitiva.'
  - 'Relacionamento precede monetizacao. Jab antes de right hook.'
  - 'Repurposing e o maior multiplicador de producao existente.'
  - 'UGC e depoimentos reais convertem mais do que qualquer copy.'
