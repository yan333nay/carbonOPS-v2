<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Slide Lista — Carbon Films</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1350px; overflow: hidden; }

.slide {
  width: 1080px; height: 1350px;
  background: var(--bg, #050505);
  display: flex; flex-direction: column;
  padding: 48px 64px 48px;
  position: relative; overflow: hidden;
}

/* Número de fundo gigante */
.num-watermark {
  position: absolute; bottom: -80px; right: -16px; z-index: 0;
  font-family: 'Anton', sans-serif; font-size: 460px; line-height: 1;
  color: var(--titulo-cor, #fff); opacity: 0.025; letter-spacing: -14px;
  pointer-events: none; user-select: none;
}

.grain {
  position: absolute; inset: 0; z-index: 0; pointer-events: none; opacity: 0.05;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 200px 200px;
}

.header {
  display: flex; align-items: center; justify-content: space-between;
  position: relative; z-index: 1; flex-shrink: 0; margin-bottom: 40px;
}
.marca { display: flex; align-items: center; gap: 16px; }
.logo-circle {
  width: 52px; height: 52px; border-radius: 50%;
  border: 1px solid var(--border, #1E1E1E);
  overflow: hidden; background: #111; flex-shrink: 0;
}
.logo-circle img { width: 100%; height: 100%; object-fit: cover; display: block; }
.handle { font-family: 'JetBrains Mono', monospace; font-size: 21px; color: var(--sub-cor, #555); }
.slide-num { font-family: 'JetBrains Mono', monospace; font-size: 20px; color: var(--label-cor, #3A3A3A); letter-spacing: 0.12em; }

/* Label + Título */
.label {
  font-family: 'JetBrains Mono', monospace; font-size: 20px;
  color: var(--sub-cor, #555); letter-spacing: 0.20em; text-transform: uppercase;
  position: relative; z-index: 1; flex-shrink: 0;
}
.titulo {
  font-family: 'Anton', sans-serif; font-size: 80px; line-height: 0.92;
  color: var(--titulo-cor, #FFFFFF); letter-spacing: -1.5px; text-transform: uppercase;
  margin-top: 14px; margin-bottom: 32px;
  position: relative; z-index: 1; flex-shrink: 0;
}

/* Lista de itens */
.lista { flex: 1; display: flex; flex-direction: column; justify-content: center; position: relative; z-index: 1; }

.item {
  display: flex; align-items: flex-start; gap: 0;
  padding: 28px 0;
  border-bottom: 1px solid var(--border, #141414);
}
.item:first-child { border-top: 1px solid var(--border, #141414); }

.item-num {
  font-family: 'JetBrains Mono', monospace; font-size: 20px; color: var(--label-cor, #3A3A3A);
  flex-shrink: 0; padding-top: 6px; min-width: 60px; letter-spacing: 0.08em;
}
.item-corpo { flex: 1; }
.item-titulo {
  font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 40px;
  color: var(--titulo-cor, #FFFFFF); line-height: 1.15; letter-spacing: -0.3px; margin-bottom: 8px;
}
.item-desc {
  font-family: 'Montserrat', sans-serif; font-size: 32px; line-height: 1.55;
  color: var(--corpo-cor, #A0A0A0);
  font-weight: 300;
}

/* Rodapé */
.rodape {
  display: flex; align-items: center; justify-content: space-between;
  padding-top: 28px; border-top: 1px solid var(--border, #141414);
  position: relative; z-index: 1; flex-shrink: 0;
}
.rod-handle { font-family: 'JetBrains Mono', monospace; font-size: 21px; color: var(--label-cor, #3A3A3A); }
.rod-num { font-family: 'JetBrains Mono', monospace; font-size: 20px; color: var(--label-cor, #3A3A3A); letter-spacing: 0.08em; }
</style>
</head>
<body>
<script>
const SLIDE = {
  label:        'CF_002 / ESTRATÉGIA',
  titulo:       'O QUE DEFINIR ANTES DE POSTAR',
  itens: [
    { num: '01', titulo: 'Objetivo claro',   desc: 'Awareness, lead ou venda. Um por campanha.' },
    { num: '02', titulo: 'Público certo',    desc: 'Nicho específico converte mais e custa menos.' },
    { num: '03', titulo: 'Hook nos 3s',      desc: 'Sem atenção inicial, o algoritmo te descarta.' },
    { num: '04', titulo: 'CTA único',        desc: 'Um pedido por post. Claro, direto, específico.' },
  ],
  numero_slide: '04 / 05',
  tema:         'dark',
};
</script>

<div class="slide" id="slide-lista">
  <span class="num-watermark" id="num-watermark">4</span>
  <div class="grain"></div>

  <div class="header">
    <div class="marca">
      <div class="logo-circle">
        <img src="../assets/logo-carbon.png" alt="" onerror="this.style.display='none'">
      </div>
      <span class="handle">@carbonfilms.sc</span>
    </div>
    <span class="slide-num" id="slide-num">04 / 05</span>
  </div>

  <span class="label" id="label">CF_002 / ESTRATÉGIA</span>
  <h2 class="titulo" id="titulo">O QUE DEFINIR ANTES DE POSTAR</h2>

  <div class="lista" id="lista"></div>

  <div class="rodape">
    <span class="rod-handle">@carbonfilms.sc</span>
    <span class="rod-num" id="rod-num">04 / 05</span>
  </div>
</div>

<script>
document.getElementById('label').textContent      = SLIDE.label;
document.getElementById('titulo').innerHTML       = SLIDE.titulo;
document.getElementById('slide-num').textContent  = SLIDE.numero_slide;
document.getElementById('rod-num').textContent    = SLIDE.numero_slide;

// Número de fundo baseado no número do slide
const slideIdx = parseInt(SLIDE.numero_slide) || 4;
document.getElementById('num-watermark').textContent = slideIdx;

const lista = document.getElementById('lista');
SLIDE.itens.forEach(item => {
  lista.innerHTML += `
    <div class="item">
      <span class="item-num">${item.num}</span>
      <div class="item-corpo">
        <div class="item-titulo">${item.titulo}</div>
        <div class="item-desc">${item.desc}</div>
      </div>
    </div>`;
});

if (SLIDE.tema === 'white') {
  const s = document.getElementById('slide-lista');
  s.style.setProperty('--bg',        '#FAFAFA');
  s.style.setProperty('--border',    '#E0E0E0');
  s.style.setProperty('--titulo-cor','#0A0A0A');
  s.style.setProperty('--corpo-cor', '#333333');
  s.style.setProperty('--sub-cor',   '#888888');
  s.style.setProperty('--label-cor', '#AAAAAA');
}
</script>
</body>
</html>
