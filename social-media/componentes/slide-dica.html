<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Slide Dica — Carbon Films</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1350px; overflow: hidden; }

.slide {
  width: 1080px; height: 1350px;
  background: var(--bg, #050505);
  display: flex; flex-direction: column;
  position: relative; overflow: hidden;
}

.grain {
  position: absolute; inset: 0; z-index: 10; pointer-events: none; opacity: 0.05;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 200px 200px;
}

/* Header compacto */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 44px 64px 0;
  position: relative; z-index: 5; flex-shrink: 0;
}
.marca { display: flex; align-items: center; gap: 16px; }
.logo-circle {
  width: 52px; height: 52px; border-radius: 50%;
  border: 1px solid var(--border, #1E1E1E);
  overflow: hidden; background: #111; flex-shrink: 0;
}
.logo-circle img { width: 100%; height: 100%; object-fit: cover; display: block; }
.handle {
  font-family: 'JetBrains Mono', monospace; font-size: 21px;
  color: var(--sub-cor, #555); letter-spacing: 0.04em;
}
.slide-num {
  font-family: 'JetBrains Mono', monospace; font-size: 20px;
  color: var(--label-cor, #3A3A3A); letter-spacing: 0.12em;
}

/* Hero image — ancora visual */
.hero-wrap {
  position: relative; flex-shrink: 0;
  width: 100%; height: 460px;
  margin-top: 32px; overflow: hidden;
}
.hero-img {
  width: 100%; height: 100%;
  background: var(--surface, #0D0D0D);
  background-size: cover; background-position: center;
}
.hero-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
.hero-grad {
  position: absolute; bottom: 0; left: 0; right: 0; height: 200px;
  background: linear-gradient(to bottom, transparent 0%, var(--bg, #050505) 100%);
  z-index: 2;
}
/* Número decorativo sangrando da imagem */
.num-deco {
  position: absolute; bottom: -28px; right: 36px; z-index: 3;
  font-family: 'Anton', sans-serif; font-size: 220px; line-height: 1;
  color: var(--titulo-cor, #fff); opacity: 0.07; letter-spacing: -6px;
  pointer-events: none; user-select: none;
}

/* Corpo */
.corpo-wrap {
  flex: 1; display: flex; flex-direction: column;
  padding: 4px 64px 0;
  position: relative; z-index: 5;
}

.categoria {
  display: inline-flex; align-items: center; gap: 14px;
  margin-bottom: 20px; align-self: flex-start;
}
.cat-barra { width: 22px; height: 2px; background: var(--sub-cor, #555); }
.cat-txt {
  font-family: 'JetBrains Mono', monospace; font-size: 20px;
  color: var(--sub-cor, #555); letter-spacing: 0.18em; text-transform: uppercase;
}

.titulo {
  font-family: 'Anton', sans-serif; font-size: 88px; line-height: 0.92;
  color: var(--titulo-cor, #FFFFFF); letter-spacing: -1.5px; text-transform: uppercase;
  margin-bottom: 28px;
}

.divisor {
  width: 100%; height: 1px; background: var(--border, #1A1A1A);
  margin-bottom: 28px; flex-shrink: 0;
}

.corpo {
  font-family: 'Montserrat', sans-serif; font-size: 40px; line-height: 1.65;
  color: var(--corpo-cor, #C0C0C0);
  font-weight: 400; flex: 1;
}

/* Rodapé */
.rodape {
  display: flex; align-items: center; justify-content: space-between;
  padding: 24px 64px 44px;
  position: relative; z-index: 5; flex-shrink: 0;
  border-top: 1px solid var(--border, #141414);
}
.rod-handle {
  font-family: 'JetBrains Mono', monospace; font-size: 21px;
  color: var(--label-cor, #3A3A3A); letter-spacing: 0.06em;
}
.rod-num {
  font-family: 'JetBrains Mono', monospace; font-size: 20px;
  color: var(--label-cor, #3A3A3A); letter-spacing: 0.10em;
}
</style>
</head>
<body>
<script>
const SLIDE = {
  numero:       '01',
  label:        'ERRO 01',
  titulo:       'SEM OBJETIVO CLARO',
  corpo:        'Impulsionar sem meta definida é queimar dinheiro. Defina primeiro: awareness, lead ou venda.',
  imagem:       '',
  numero_slide: '02 / 05',
  tema:         'dark',
};
</script>

<div class="slide" id="slide-dica">
  <div class="grain"></div>

  <div class="header">
    <div class="marca">
      <div class="logo-circle">
        <img src="../assets/logo-carbon.png" alt="" onerror="this.style.display='none'">
      </div>
      <span class="handle">@carbonfilms.sc</span>
    </div>
    <span class="slide-num" id="slide-num">02 / 05</span>
  </div>

  <div class="hero-wrap">
    <div class="hero-img" id="hero-img"></div>
    <div class="hero-grad"></div>
    <span class="num-deco" id="num-deco">01</span>
  </div>

  <div class="corpo-wrap">
    <div class="categoria">
      <span class="cat-barra"></span>
      <span class="cat-txt" id="cat-txt">Erro 01</span>
    </div>
    <h2 class="titulo" id="titulo">SEM OBJETIVO CLARO</h2>
    <div class="divisor"></div>
    <p class="corpo" id="corpo">Impulsionar sem meta definida é queimar dinheiro. Defina primeiro: awareness, lead ou venda.</p>
  </div>

  <div class="rodape">
    <span class="rod-handle">@carbonfilms.sc</span>
    <span class="rod-num" id="rod-num">02 / 05</span>
  </div>
</div>

<script>
document.getElementById('slide-num').textContent = SLIDE.numero_slide;
document.getElementById('rod-num').textContent   = SLIDE.numero_slide;
document.getElementById('num-deco').textContent  = SLIDE.numero.replace(/\D/g, '').padStart(2, '0') || '01';
document.getElementById('cat-txt').textContent   = SLIDE.label;
document.getElementById('titulo').innerHTML       = SLIDE.titulo;
document.getElementById('corpo').textContent      = SLIDE.corpo;

if (SLIDE.imagem) {
  document.getElementById('hero-img').style.backgroundImage = `url('${SLIDE.imagem}')`;
}

if (SLIDE.tema === 'white') {
  const s = document.getElementById('slide-dica');
  s.style.setProperty('--bg',        '#FAFAFA');
  s.style.setProperty('--surface',   '#F0F0F0');
  s.style.setProperty('--border',    '#E0E0E0');
  s.style.setProperty('--titulo-cor','#0A0A0A');
  s.style.setProperty('--corpo-cor', '#333333');
  s.style.setProperty('--sub-cor',   '#888888');
  s.style.setProperty('--label-cor', '#AAAAAA');
}
</script>
</body>
</html>
