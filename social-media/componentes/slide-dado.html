<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Slide Dado — Carbon Films</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1350px; overflow: hidden; }

.slide {
  width: 1080px; height: 1350px;
  background: var(--bg, #050505);
  display: flex; flex-direction: column;
  padding: 48px 64px 48px;
  position: relative; overflow: hidden;
}

/* Cantos decorativos — sutis mas presentes */
.corner {
  position: absolute; width: 64px; height: 64px;
  border-color: rgba(255,255,255,0.06); border-style: solid; z-index: 0; pointer-events: none;
}
.corner-tl { top: 44px; left: 44px; border-width: 1px 0 0 1px; }
.corner-tr { top: 44px; right: 44px; border-width: 1px 1px 0 0; }
.corner-bl { bottom: 44px; left: 44px; border-width: 0 0 1px 1px; }
.corner-br { bottom: 44px; right: 44px; border-width: 0 1px 1px 0; }

.grain {
  position: absolute; inset: 0; z-index: 0; pointer-events: none; opacity: 0.05;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 200px 200px;
}

.header {
  display: flex; align-items: center; justify-content: space-between;
  position: relative; z-index: 1; flex-shrink: 0;
}
.marca { display: flex; align-items: center; gap: 16px; }
.logo-circle {
  width: 52px; height: 52px; border-radius: 50%;
  border: 1px solid var(--border, #1E1E1E);
  overflow: hidden; background: #111; flex-shrink: 0;
}
.logo-circle img { width: 100%; height: 100%; object-fit: cover; display: block; }
.handle { font-family: 'JetBrains Mono', monospace; font-size: 21px; color: var(--sub-cor, #555); }
.slide-num { font-family: 'JetBrains Mono', monospace; font-size: 20px; color: var(--label-cor, #3A3A3A); letter-spacing: 0.12em; }

/* Centro — estatística */
.centro {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  position: relative; z-index: 1;
}

.dado-label {
  font-family: 'JetBrains Mono', monospace; font-size: 22px; color: var(--sub-cor, #555);
  letter-spacing: 0.22em; text-transform: uppercase; margin-bottom: 36px;
  display: flex; align-items: center; gap: 16px;
}
.dado-label::before,
.dado-label::after {
  content: ''; display: block;
  width: 24px; height: 1px; background: var(--sub-cor, #555); opacity: 0.5;
}

.numero-row { display: flex; align-items: flex-end; margin-bottom: 40px; }
.dado-numero {
  font-family: 'Anton', sans-serif; font-size: 240px; line-height: 0.88;
  color: var(--titulo-cor, #FFFFFF); letter-spacing: -6px;
}
.dado-unidade {
  font-family: 'Anton', sans-serif; font-size: 80px;
  color: var(--corpo-cor, #C0C0C0); letter-spacing: -2px;
  align-self: flex-end; margin-bottom: 18px; margin-left: 6px;
}

.dado-linha { width: 64px; height: 1px; background: var(--border, #1E1E1E); margin-bottom: 40px; }

.dado-titulo {
  font-family: 'Anton', sans-serif; font-size: 68px; line-height: 1.05;
  color: var(--titulo-cor, #FFFFFF); letter-spacing: -1px; text-transform: uppercase;
  text-align: center; margin-bottom: 28px;
}
.dado-corpo {
  font-family: 'Montserrat', sans-serif; font-size: 36px; line-height: 1.65;
  color: var(--corpo-cor, #C0C0C0); font-weight: 400;
  text-align: center; max-width: 840px;
}

.rodape {
  display: flex; align-items: center; justify-content: space-between;
  padding-top: 28px; border-top: 1px solid var(--border, #141414);
  position: relative; z-index: 1; flex-shrink: 0;
}
.rod-handle { font-family: 'JetBrains Mono', monospace; font-size: 21px; color: var(--label-cor, #3A3A3A); letter-spacing: 0.06em; }
.rod-num { font-family: 'JetBrains Mono', monospace; font-size: 20px; color: var(--label-cor, #3A3A3A); letter-spacing: 0.08em; }
</style>
</head>
<body>
<script>
const SLIDE = {
  label:        'RESULTADO REAL',
  numero:       '+300',
  unidade:      '%',
  titulo:       'DE ENGAJAMENTO EM 90 DIAS',
  corpo:        'Aplicando os 3 pilares certos: consistência, relevância e CTA.',
  numero_slide: '03 / 05',
  tema:         'dark',
};
</script>

<div class="slide" id="slide-dado">
  <div class="corner corner-tl"></div><div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div><div class="corner corner-br"></div>
  <div class="grain"></div>

  <div class="header">
    <div class="marca">
      <div class="logo-circle">
        <img src="../assets/logo-carbon.png" alt="" onerror="this.style.display='none'">
      </div>
      <span class="handle">@carbonfilms.sc</span>
    </div>
    <span class="slide-num" id="slide-num">03 / 05</span>
  </div>

  <div class="centro">
    <span class="dado-label" id="dado-label">RESULTADO REAL</span>
    <div class="numero-row">
      <span class="dado-numero" id="dado-numero">+300</span>
      <span class="dado-unidade" id="dado-unidade">%</span>
    </div>
    <div class="dado-linha"></div>
    <h2 class="dado-titulo" id="dado-titulo">DE ENGAJAMENTO EM 90 DIAS</h2>
    <p class="dado-corpo" id="dado-corpo">Aplicando os 3 pilares certos: consistência, relevância e CTA.</p>
  </div>

  <div class="rodape">
    <span class="rod-handle">@carbonfilms.sc</span>
    <span class="rod-num" id="rod-num">03 / 05</span>
  </div>
</div>

<script>
document.getElementById('dado-label').textContent   = SLIDE.label;
document.getElementById('dado-numero').textContent  = SLIDE.numero;
document.getElementById('dado-unidade').textContent = SLIDE.unidade;
document.getElementById('dado-titulo').innerHTML    = SLIDE.titulo;
document.getElementById('dado-corpo').textContent   = SLIDE.corpo;
document.getElementById('slide-num').textContent    = SLIDE.numero_slide;
document.getElementById('rod-num').textContent      = SLIDE.numero_slide;

if (SLIDE.tema === 'white') {
  const s = document.getElementById('slide-dado');
  s.style.setProperty('--bg',        '#FAFAFA');
  s.style.setProperty('--border',    '#E0E0E0');
  s.style.setProperty('--titulo-cor','#0A0A0A');
  s.style.setProperty('--corpo-cor', '#333333');
  s.style.setProperty('--sub-cor',   '#888888');
  s.style.setProperty('--label-cor', '#AAAAAA');
  document.querySelectorAll('.corner').forEach(c => {
    c.style.borderColor = 'rgba(10,10,10,0.08)';
  });
}
</script>
</body>
</html>
