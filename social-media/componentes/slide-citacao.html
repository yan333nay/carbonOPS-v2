<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Slide Citação — Carbon Films</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:ital,wght@0,300;0,400;0,700;1,300&family=Playfair+Display:ital@1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1350px; overflow: hidden; background: #050505; }

.slide {
  width: 1080px; height: 1350px;
  display: flex; flex-direction: column;
  padding: 48px 64px 48px;
  position: relative; overflow: hidden;
}

.bg-image { position: absolute; inset: 0; background-size: cover; background-position: center; z-index: 0; }
.bg-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(160deg, rgba(5,5,5,0.92) 0%, rgba(5,5,5,0.85) 55%, rgba(5,5,5,0.95) 100%);
  z-index: 1;
}

.grain {
  position: absolute; inset: 0; z-index: 2; pointer-events: none; opacity: 0.055;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 200px 200px;
}

.header {
  display: flex; align-items: center; justify-content: space-between;
  position: relative; z-index: 3; flex-shrink: 0;
}
.marca { display: flex; align-items: center; gap: 16px; }
.logo-circle {
  width: 52px; height: 52px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.14);
  overflow: hidden; background: #111; flex-shrink: 0;
}
.logo-circle img { width: 100%; height: 100%; object-fit: cover; display: block; }
.handle { font-family: 'JetBrains Mono', monospace; font-size: 21px; color: rgba(255,255,255,0.32); }
.label-topo { font-family: 'JetBrains Mono', monospace; font-size: 20px; color: rgba(255,255,255,0.28); letter-spacing: 0.12em; text-transform: uppercase; }

/* Área central da citação */
.centro {
  flex: 1; display: flex; flex-direction: column; justify-content: center;
  position: relative; z-index: 3; padding: 48px 0;
}

/* Aspas decorativas */
.aspas {
  font-family: 'Playfair Display', serif; font-style: italic;
  font-size: 240px; color: #fff; line-height: 0.55; opacity: 0.09;
  margin-bottom: -16px; display: block;
}

.citacao {
  font-family: 'Playfair Display', serif; font-style: italic;
  font-size: 66px; line-height: 1.38; color: #FFFFFF;
  letter-spacing: -0.3px; margin-bottom: 52px;
}
.citacao em { font-style: normal; }

.divisor { width: 48px; height: 1px; background: rgba(255,255,255,0.22); margin-bottom: 32px; }

.autor-nome {
  font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 36px;
  color: #fff; margin-bottom: 8px;
}
.autor-cargo {
  font-family: 'JetBrains Mono', monospace; font-size: 22px;
  color: rgba(255,255,255,0.40); letter-spacing: 0.06em; text-transform: uppercase;
}

.rodape {
  display: flex; align-items: center; justify-content: space-between;
  padding-top: 32px; border-top: 1px solid rgba(255,255,255,0.07);
  position: relative; z-index: 3; flex-shrink: 0;
}
.rod-handle { font-family: 'JetBrains Mono', monospace; font-size: 21px; color: rgba(255,255,255,0.22); }
.rod-num { font-family: 'JetBrains Mono', monospace; font-size: 20px; color: rgba(255,255,255,0.22); }
</style>
</head>
<body>
<script>
const SLIDE = {
  label:        'CF_003 / INSIGHT',
  citacao:      'Na Carbon, o mínimo aqui é o <em>máximo</em> em outros lugares.',
  autor_nome:   'Carbon Films',
  autor_cargo:  'Marketing Visual com Estratégia',
  imagem:       '',
  numero_slide: '03 / 05',
};
</script>

<div class="slide" id="slide-citacao">
  <div class="bg-image" id="bg-image"></div>
  <div class="bg-overlay" id="bg-overlay"></div>
  <div class="grain"></div>

  <div class="header">
    <div class="marca">
      <div class="logo-circle">
        <img src="../assets/logo-carbon.png" alt="" onerror="this.style.display='none'">
      </div>
      <span class="handle">@carbonfilms.sc</span>
    </div>
    <span class="label-topo" id="label-topo">CF_003 / INSIGHT</span>
  </div>

  <div class="centro">
    <span class="aspas">"</span>
    <p class="citacao" id="citacao"></p>
    <div class="divisor"></div>
    <div class="autor-nome" id="autor-nome">Carbon Films</div>
    <div class="autor-cargo" id="autor-cargo">Marketing Visual com Estratégia</div>
  </div>

  <div class="rodape">
    <span class="rod-handle">@carbonfilms.sc</span>
    <span class="rod-num" id="rod-num">03 / 05</span>
  </div>
</div>

<script>
document.getElementById('label-topo').textContent = SLIDE.label;
document.getElementById('citacao').innerHTML      = `“${SLIDE.citacao}”`;
document.getElementById('autor-nome').textContent  = SLIDE.autor_nome;
document.getElementById('autor-cargo').textContent = SLIDE.autor_cargo;
document.getElementById('rod-num').textContent     = SLIDE.numero_slide;

if (SLIDE.imagem) {
  document.getElementById('bg-image').style.backgroundImage = `url('${SLIDE.imagem}')`;
} else {
  document.getElementById('bg-overlay').style.background = 'linear-gradient(150deg, #0C0C0C 0%, #050505 100%)';
}
</script>
</body>
</html>
