<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Slide CTA — Carbon Films</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1350px; overflow: hidden; }

.slide {
  width: 1080px; height: 1350px;
  background: var(--bg, #050505);
  display: flex; flex-direction: column;
  padding: 48px 64px 48px;
  position: relative; overflow: hidden;
}

.grain {
  position: absolute; inset: 0; z-index: 0; pointer-events: none; opacity: 0.05;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 200px 200px;
}

.header {
  display: flex; align-items: center; justify-content: space-between;
  position: relative; z-index: 1; flex-shrink: 0; margin-bottom: 36px;
}
.marca { display: flex; align-items: center; gap: 16px; }
.logo-circle {
  width: 52px; height: 52px; border-radius: 50%;
  border: 1px solid var(--border, #1E1E1E);
  overflow: hidden; background: #111; flex-shrink: 0;
}
.logo-circle img { width: 100%; height: 100%; object-fit: cover; display: block; }
.handle { font-family: 'JetBrains Mono', monospace; font-size: 21px; color: var(--sub-cor, #555); }
.slide-num { font-family: 'JetBrains Mono', monospace; font-size: 20px; color: var(--label-cor, #3A3A3A); letter-spacing: 0.12em; }

/* Headline principal */
.headline {
  font-family: 'Anton', sans-serif; font-size: 108px; line-height: 0.90;
  color: var(--titulo-cor, #FFFFFF); letter-spacing: -2px; text-transform: uppercase;
  margin-bottom: 36px; position: relative; z-index: 1; flex-shrink: 0;
}

/* Card de serviços */
.servicos-card {
  background: var(--surface, #0A0A0A);
  border: 1px solid var(--border, #1A1A1A);
  border-radius: 16px;
  padding: 32px 40px;
  position: relative; z-index: 1; flex: 1;
  margin-bottom: 28px;
}
.servico-item {
  display: flex; align-items: flex-start; gap: 20px;
  padding: 16px 0; border-bottom: 1px solid var(--border, #141414);
}
.servico-item:last-child { border-bottom: none; padding-bottom: 0; }
.servico-item:first-child { padding-top: 0; }
.servico-num {
  font-family: 'JetBrains Mono', monospace; font-size: 20px;
  color: var(--label-cor, #3A3A3A);
  flex-shrink: 0; padding-top: 4px; min-width: 36px; letter-spacing: 0.06em;
}
.servico-titulo {
  font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 36px;
  color: var(--titulo-cor, #FFFFFF); margin-bottom: 4px;
}
.servico-desc {
  font-family: 'Montserrat', sans-serif; font-size: 28px;
  color: var(--corpo-cor, #A0A0A0); font-weight: 300;
}

/* Pill de CTA */
.pill {
  background: var(--titulo-cor, #FFFFFF);
  border-radius: 14px;
  padding: 26px 40px;
  display: flex; align-items: center; justify-content: space-between;
  position: relative; z-index: 1; flex-shrink: 0;
  margin-bottom: 28px;
}
.pill-titulo {
  font-family: 'Anton', sans-serif; font-size: 46px;
  color: var(--bg, #050505); letter-spacing: -0.5px; text-transform: uppercase; line-height: 1.1;
}
.pill-sub {
  font-family: 'Montserrat', sans-serif; font-size: 26px;
  color: var(--pill-sub, #666); margin-top: 4px;
}
.pill-arrow {
  width: 64px; height: 64px; background: var(--bg, #050505);
  border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.pill-arrow svg { width: 28px; height: 28px; }

/* Rodapé */
.rodape {
  display: flex; align-items: center; justify-content: space-between;
  border-top: 1px solid var(--border, #141414); padding-top: 24px;
  position: relative; z-index: 1; flex-shrink: 0;
}
.rod-handle { font-family: 'JetBrains Mono', monospace; font-size: 21px; color: var(--label-cor, #3A3A3A); }
.rod-num { font-family: 'JetBrains Mono', monospace; font-size: 20px; color: var(--label-cor, #3A3A3A); letter-spacing: 0.08em; }
</style>
</head>
<body>
<script>
const SLIDE = {
  headline:    'QUER ESSE\nRESULTADO?',
  servicos: [
    { titulo: 'Identidade visual',    desc: 'que gera confiança imediata' },
    { titulo: 'Conteúdo estratégico', desc: 'autoridade + alcance orgânico' },
    { titulo: 'Vídeos profissionais', desc: 'conversão + impacto cinematic' },
    { titulo: 'Gestão de redes',      desc: 'presença constante e resultados' },
  ],
  pill_titulo:  'FALAR COM A CARBON',
  pill_sub:     'DM ou link na bio',
  numero_slide: '05 / 05',
  tema:         'dark',
};
</script>

<div class="slide" id="slide-cta">
  <div class="grain"></div>

  <div class="header">
    <div class="marca">
      <div class="logo-circle">
        <img src="../assets/logo-carbon.png" alt="" onerror="this.style.display='none'">
      </div>
      <span class="handle">@carbonfilms.sc</span>
    </div>
    <span class="slide-num" id="slide-num">05 / 05</span>
  </div>

  <h1 class="headline" id="headline">QUER ESSE<br>RESULTADO?</h1>

  <div class="servicos-card" id="servicos-card"></div>

  <div class="pill" id="pill">
    <div>
      <div class="pill-titulo" id="pill-titulo">FALAR COM A CARBON</div>
      <div class="pill-sub" id="pill-sub">DM ou link na bio</div>
    </div>
    <div class="pill-arrow" id="pill-arrow">
      <svg viewBox="0 0 28 28" fill="none">
        <path d="M6 14h16M17 8l6 6-6 6" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </div>

  <div class="rodape">
    <span class="rod-handle">@carbonfilms.sc</span>
    <span class="rod-num" id="rod-num">05 / 05</span>
  </div>
</div>

<script>
document.getElementById('headline').innerHTML   = SLIDE.headline.replace(/\n/g, '<br>');
document.getElementById('pill-titulo').textContent = SLIDE.pill_titulo;
document.getElementById('pill-sub').textContent    = SLIDE.pill_sub;
document.getElementById('slide-num').textContent   = SLIDE.numero_slide;
document.getElementById('rod-num').textContent     = SLIDE.numero_slide;

const card = document.getElementById('servicos-card');
SLIDE.servicos.forEach((s, i) => {
  card.innerHTML += `<div class="servico-item">
    <span class="servico-num">0${i + 1}</span>
    <div>
      <div class="servico-titulo">${s.titulo}</div>
      <div class="servico-desc">${s.desc}</div>
    </div>
  </div>`;
});

if (SLIDE.tema === 'white') {
  const s = document.getElementById('slide-cta');
  s.style.setProperty('--bg',        '#FAFAFA');
  s.style.setProperty('--surface',   '#F0F0F0');
  s.style.setProperty('--border',    '#E0E0E0');
  s.style.setProperty('--titulo-cor','#0A0A0A');
  s.style.setProperty('--corpo-cor', '#444444');
  s.style.setProperty('--sub-cor',   '#888888');
  s.style.setProperty('--label-cor', '#AAAAAA');
  s.style.setProperty('--pill-sub',  '#888888');
  // Inverte pill para dark
  document.getElementById('pill').style.background = '#0A0A0A';
  document.getElementById('pill-titulo').style.color = '#FFFFFF';
  document.getElementById('pill-sub').style.color = '#888';
  document.getElementById('pill-arrow').style.background = '#FFFFFF';
  document.querySelector('.pill-arrow svg path').setAttribute('stroke', '#0A0A0A');
}
</script>
</body>
</html>
