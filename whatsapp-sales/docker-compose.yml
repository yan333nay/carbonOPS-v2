version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: evolution-postgres
    environment:
      POSTGRES_DB: evolution
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: Ev0luti0nDB2025
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution -d evolution"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: evolution-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: evolution-api
    ports:
      - "8081:8080"
    environment:
      SERVER_URL: "http://76.13.172.41:8081"
      AUTHENTICATION_TYPE: "apikey"
      AUTHENTICATION_API_KEY: "Carbonfilms2025#"
      QRCODE_LIMIT: "30"
      DEL_INSTANCE: "false"
      CONFIG_SESSION_PHONE_CLIENT: "Carbon Films"
      CONFIG_SESSION_PHONE_NAME: "Chrome"
      # Database
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: "postgresql"
      DATABASE_CONNECTION_URI: "postgresql://evolution:Ev0luti0nDB2025@postgres:5432/evolution?schema=public"
      DATABASE_CONNECTION_CLIENT_NAME: "evolution"
      DATABASE_SAVE_DATA_INSTANCES: "true"
      DATABASE_SAVE_DATA_MESSAGES: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      # Redis
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: "redis://redis:6379/6"
      CACHE_REDIS_PREFIX_KEY: "evolution"
      CACHE_REDIS_SAVE_INSTANCES: "false"
      CACHE_LOCAL_ENABLED: "false"
      # Webhook
      WEBHOOK_GLOBAL_ENABLED: "false"
    volumes:
      - evolution_data:/evolution/instances
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  evolution_data:
  postgres_data:
  redis_data:
